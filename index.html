<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASOKA Zen Order</title>
    <style>
        :root { --gold: #d4af37; --dark: #1a1a1a; --gray: #333; }
        body { background: var(--dark); color: var(--gold); font-family: sans-serif; margin: 0; padding: 20px; }
        header { text-align: center; border-bottom: 1px solid var(--gray); padding-bottom: 20px; margin-bottom: 20px; }
        h1 { letter-spacing: 5px; margin: 0; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-item { border: 1px solid var(--gray); padding: 15px; border-radius: 10px; text-align: center; background: #222; }
        .menu-item h3 { margin: 10px 0 5px 0; color: #fff; }
        .price { font-size: 0.9em; color: var(--gold); }
        .btn-add { background: var(--gold); color: var(--dark); border: none; padding: 8px 15px; border-radius: 5px; margin-top: 10px; font-weight: bold; width: 100%; }
        .cart-summary { position: fixed; bottom: 0; left: 0; right: 0; background: var(--gold); color: var(--dark); padding: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>ASOKA</h1>
    <small>Japanese Sanctuary - Sudirman</small>
</header>

<div class="menu-grid">
    <div class="menu-item">
        <h3>Cireng ASOKA</h3>
        <div class="price">Rp 15.000</div>
        <button class="btn-add" onclick="tambahPesan('Cireng ASOKA')">Tambah</button>
    </div>
    <div class="menu-item">
        <h3>Kopi Susu Zen</h3>
        <div class="price">Rp 20.000</div>
        <button class="btn-add" onclick="tambahPesan('Kopi Susu Zen')">Tambah</button>
    </div>
    <div class="menu-item">
        <h3>Tahu Krispy</h3>
        <div class="price">Rp 12.000</div>
        <button class="btn-add" onclick="tambahPesan('Tahu Krispy')">Tambah</button>
    </div>
</div>

<div class="cart-summary" id="summary">
    Belum ada pesanan
</div>

<script>
    let totalPesan = 0;
    function tambahPesan(nama) {
        totalPesan++;
        document.getElementById('summary').innerText = totalPesan + " Item terpilih (Kirim ke Dapur)";
        alert(nama + " ditambahkan ke pesanan.");
    }
</script>

</body>
</html>
